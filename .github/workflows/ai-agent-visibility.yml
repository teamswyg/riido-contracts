name: ai-agent-visibility

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ai-agent-visibility.yml"
      - "docs/20-domain/ai-agent-visibility.md"
      - "docs/20-domain/ai-agent-visibility.riido.json"
      - "docs/20-domain/ai-agent-policy.md"
      - "docs/30-architecture/ssot-dependency-map.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.dsl.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.ir.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.openapi.json"
      - "tools/aiagentvisibility/**"
      - "go.mod"
  pull_request:
    paths:
      - ".github/workflows/ai-agent-visibility.yml"
      - "docs/20-domain/ai-agent-visibility.md"
      - "docs/20-domain/ai-agent-visibility.riido.json"
      - "docs/20-domain/ai-agent-policy.md"
      - "docs/30-architecture/ssot-dependency-map.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.dsl.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.ir.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.openapi.json"
      - "tools/aiagentvisibility/**"
      - "go.mod"

jobs:
  ai-agent-visibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify stdlib-only module
        run: test "$(go list -m all | wc -l | tr -d ' ')" = "1"
      - name: Verify AI Agent visibility evidence
        run: |
          mkdir -p out
          go test ./tools/aiagentvisibility -count=1
          go run ./tools/aiagentvisibility \
            -check-doc \
            -evidence-out out/ai-agent-visibility-evidence.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-agent-visibility-evidence
          path: out/ai-agent-visibility-evidence.json
          if-no-files-found: error
