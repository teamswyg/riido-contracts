name: ai-agent-task-assignment

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ai-agent-task-assignment.yml"
      - "docs/20-domain/ai-agent-task-assignment.md"
      - "docs/20-domain/ai-agent-task-assignment.riido.json"
      - "docs/20-domain/ai-agent-policy.md"
      - "docs/30-architecture/ssot-dependency-map.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.dsl.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.ir.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.openapi.json"
      - "tools/aiagenttaskassignment/**"
      - "go.mod"
  pull_request:
    paths:
      - ".github/workflows/ai-agent-task-assignment.yml"
      - "docs/20-domain/ai-agent-task-assignment.md"
      - "docs/20-domain/ai-agent-task-assignment.riido.json"
      - "docs/20-domain/ai-agent-policy.md"
      - "docs/30-architecture/ssot-dependency-map.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.dsl.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.ir.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.openapi.json"
      - "tools/aiagenttaskassignment/**"
      - "go.mod"

jobs:
  ai-agent-task-assignment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify stdlib-only module
        run: test "$(go list -m all | wc -l | tr -d ' ')" = "1"
      - name: Verify AI Agent task assignment evidence
        run: |
          mkdir -p out
          go test ./tools/aiagenttaskassignment -count=1
          go run ./tools/aiagenttaskassignment \
            -check-doc \
            -evidence-out out/ai-agent-task-assignment-evidence.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ai-agent-task-assignment-evidence
          path: out/ai-agent-task-assignment-evidence.json
          if-no-files-found: error
