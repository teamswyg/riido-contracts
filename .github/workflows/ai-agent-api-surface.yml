name: ai-agent-api-surface

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ai-agent-api-surface.yml"
      - "docs/20-domain/ai-agent-api-surface.md"
      - "docs/20-domain/ai-agent-api-surface.riido.json"
      - "docs/20-domain/ai-agent-policy.md"
      - "apicontract/fixtures/control-plane-ai-agent-client.dsl.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.ir.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.openapi.json"
      - "tools/aiagentapisurface/**"
      - "go.mod"
  pull_request:
    paths:
      - ".github/workflows/ai-agent-api-surface.yml"
      - "docs/20-domain/ai-agent-api-surface.md"
      - "docs/20-domain/ai-agent-api-surface.riido.json"
      - "docs/20-domain/ai-agent-policy.md"
      - "apicontract/fixtures/control-plane-ai-agent-client.dsl.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.ir.riido.json"
      - "apicontract/fixtures/control-plane-ai-agent-client.openapi.json"
      - "tools/aiagentapisurface/**"
      - "go.mod"

jobs:
  ai-agent-api-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify stdlib-only module
        run: test "$(go list -m all | wc -l | tr -d ' ')" = "1"
      - name: Verify AI Agent API surface evidence
        run: |
          mkdir -p out
          go test ./tools/aiagentapisurface -count=1
          go run ./tools/aiagentapisurface \
            -check-doc \
            -evidence-out out/ai-agent-api-surface-evidence.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ai-agent-api-surface-evidence
          path: out/ai-agent-api-surface-evidence.json
          if-no-files-found: error
