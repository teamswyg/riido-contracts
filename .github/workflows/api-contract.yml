name: api-contract

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/api-contract.yml"
      - "apicontract/**"
      - "tools/apicontract/**"
      - "tools/apicontractdoc/**"
      - "docs/20-domain/api-contract-projection.md"
      - "docs/20-domain/api-contract-projection.riido.json"
      - "docs/20-domain/ai-agent-policy.md"
      - "docs/20-domain/context-map.md"
      - "docs/30-architecture/integration-matrix.md"
      - "docs/30-architecture/module-decomposition.md"
      - "docs/migration/contracts.md"
      - "go.mod"
  pull_request:
    paths:
      - ".github/workflows/api-contract.yml"
      - "apicontract/**"
      - "tools/apicontract/**"
      - "tools/apicontractdoc/**"
      - "docs/20-domain/api-contract-projection.md"
      - "docs/20-domain/api-contract-projection.riido.json"
      - "docs/20-domain/ai-agent-policy.md"
      - "docs/20-domain/context-map.md"
      - "docs/30-architecture/integration-matrix.md"
      - "docs/30-architecture/module-decomposition.md"
      - "docs/migration/contracts.md"
      - "go.mod"

jobs:
  api-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify stdlib-only module
        run: test "$(go list -m all | wc -l | tr -d ' ')" = "1"
      - name: Verify API contract drift
        run: |
          mkdir -p out
          go run ./tools/apicontract verify
          go run ./tools/apicontractdoc \
            -check-doc \
            -evidence-out out/api-contract-evidence.json
      - name: Test API contract projection
        run: go test ./apicontract ./tools/apicontractdoc -run 'AgentCatalog|AIAgentClient|GenerateIR|BuildAPIProjectionReader|APIProjectionEvidenceCounts' -count=1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-contract-evidence
          path: out/api-contract-evidence.json
          if-no-files-found: error
