name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify stdlib-only module
        run: test "$(go list -m all | wc -l | tr -d ' ')" = "1"
      - name: Verify generated enum drift
        run: go run ./tools/enumgen verify
      - name: Verify generated FSM drift
        run: go run ./tools/fsmgen verify
      - name: Test
        run: go test ./...
