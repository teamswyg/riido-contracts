name: contract-ui

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/contract-ui.yml"
      - "apicontract/fixtures/*.ir.riido.json"
      - "apicontract/fixtures/*.openapi.json"
      - "contract-ui/**"
      - "tools/contractui/**"
      - "go.mod"
  pull_request:
    paths:
      - ".github/workflows/contract-ui.yml"
      - "apicontract/fixtures/*.ir.riido.json"
      - "apicontract/fixtures/*.openapi.json"
      - "contract-ui/**"
      - "tools/contractui/**"
      - "go.mod"

jobs:
  contract-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: contract-ui/package-lock.json
      - name: Verify generated contract UI bundle
        run: |
          go test ./tools/contractui -count=1
          go run ./tools/contractui verify
      - name: Build contract UI
        working-directory: contract-ui
        run: |
          npm ci
          npm run build
      - name: Test contract UI golden screens
        working-directory: contract-ui
        run: |
          npx playwright install chromium
          npm run test:golden
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: contract-ui-golden-screens
          path: |
            contract-ui/golden/*.png
            contract-ui/test-results/golden-current/*.png
            contract-ui/test-results/golden-diff/*.png
