name: architecture-docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/architecture-docs.yml"
      - "README.md"
      - "docs/20-domain/context-map.md"
      - "docs/20-domain/context-map.riido.json"
      - "docs/20-domain/README.md"
      - "docs/20-domain/README.riido.json"
      - "docs/20-domain/api-contract-projection.md"
      - "docs/20-domain/ai-agent-policy.md"
      - "docs/30-architecture/**"
      - "docs/50-roadmap/open-questions.md"
      - "docs/migration/contracts.md"
      - "docs/migration/contracts.riido.json"
      - "tools/architecturedocs/**"
      - "tools/contextmap/**"
      - "tools/domaindocs/**"
      - "tools/migrationdocs/**"
      - "tools/figmacoverage/**"
      - "tools/promotionpolicy/**"
      - "tools/refactorcharter/**"
      - "tools/ssotdeps/**"
  pull_request:
    paths:
      - ".github/workflows/architecture-docs.yml"
      - "README.md"
      - "docs/20-domain/context-map.md"
      - "docs/20-domain/context-map.riido.json"
      - "docs/20-domain/README.md"
      - "docs/20-domain/README.riido.json"
      - "docs/20-domain/api-contract-projection.md"
      - "docs/20-domain/ai-agent-policy.md"
      - "docs/30-architecture/**"
      - "docs/50-roadmap/open-questions.md"
      - "docs/migration/contracts.md"
      - "docs/migration/contracts.riido.json"
      - "tools/architecturedocs/**"
      - "tools/contextmap/**"
      - "tools/domaindocs/**"
      - "tools/migrationdocs/**"
      - "tools/figmacoverage/**"
      - "tools/promotionpolicy/**"
      - "tools/refactorcharter/**"
      - "tools/ssotdeps/**"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify executable architecture manifests
        run: |
          mkdir -p out
          go run ./tools/architecturedocs verify -check-doc -evidence-out out/architecturedocs-evidence.json
          go run ./tools/contextmap verify -check-doc -evidence-out out/context-map-evidence.json
          go run ./tools/domaindocs verify -check-doc -evidence-out out/domain-docs-index-evidence.json
          go run ./tools/migrationdocs verify -check-doc -evidence-out out/migration-ledger-evidence.json
          go run ./tools/ssotdeps verify -check-doc -evidence-out out/ssotdeps-evidence.json
          go run ./tools/figmacoverage verify -check-doc -evidence-out out/figmacoverage-evidence.json
          go run ./tools/promotionpolicy verify -check-doc -evidence-out out/promotionpolicy-evidence.json
          go run ./tools/refactorcharter -evidence-out out/refactorcharter-evidence.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: architecture-docs-evidence
          path: out/*.json
          if-no-files-found: error
      - name: Verify stdlib-only module
        run: test "$(go list -m all | wc -l | tr -d ' ')" = "1"
      - name: Test
        run: go test ./...
